{% extends 'waste_management/base.html' %}
{% block title %}Delete Report — ReporTrash{% endblock %}

{% block content %}
<div class="page-wrap" style="max-width: 500px; margin: 0 auto; padding: 40px 16px;">
  <div class="glass-card" style="text-align: center; padding: 40px 30px;">
    <div style="font-size: 4rem; color: var(--danger); margin-bottom: 20px;">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h1 style="font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px;">
      Delete Report
    </h1>
    
    <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 25px;">
      Are you sure you want to delete "<strong>{{ report.title }}</strong>"?
    </p>
    
    <p style="color: var(--text-muted); margin-bottom: 30px;">
      This action cannot be undone.
    </p>
    
    <div style="display: flex; gap: 12px;">
      <form method="post" style="flex: 1;">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; background: var(--danger); color: white;">
          <i class="fas fa-trash-alt"></i> Yes, Delete
        </button>
      </form>
      <a href="{% url 'history' %}" class="btn btn-glass" style="flex: 1; justify-content: center;">
        <i class="fas fa-times"></i> Cancel
      </a>
    </div>
  </div>
</div>
{% endblock %}
